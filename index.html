<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cards &amp; Groups</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #14161c;
    --panel: #1e222b;
    --panel-raised: #262b36;
    --ink: #e6e9f0;
    --muted: #8b93a7;
    --border: #333a48;
    --accent: #5c7cfa;
    --accent-ink: #ffffff;
    --danger: #ff6b6b;
    --danger-bg: rgba(255, 107, 107, .12);
    --drop: #5c7cfa;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 4px 12px rgba(0, 0, 0, .2);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }

  .app {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }

  h1 { font-size: 20px; margin: 0; letter-spacing: -.01em; }

  .actions { display: flex; gap: 8px; }

  /* ---------- Controls ---------- */
  .btn {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 10px;
    font: inherit;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: var(--panel-raised); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  input[type="text"], textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font: inherit;
    color: var(--ink);
    background: var(--panel);
  }
  input[type="text"]:focus, textarea:focus {
    outline: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
    border-color: var(--accent);
  }

  /* ---------- Composer bar ---------- */
  .composer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .composer form {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    box-shadow: var(--shadow);
  }
  .composer label {
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
    color: var(--muted);
  }

  /* ---------- Board ---------- */
  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    align-items: start;
  }

  .group {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    transition: box-shadow .12s, opacity .12s;
  }
  .group.dragging { opacity: .4; }
  .group.drop-before { box-shadow: -3px 0 0 var(--drop), var(--shadow); }
  .group.drop-after  { box-shadow:  3px 0 0 var(--drop), var(--shadow); }

  .group-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: grab;
    user-select: none;
  }
  .group-head:active { cursor: grabbing; }
  .group-title {
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .group-count {
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    border-radius: 99px;
    padding: 2px 8px;
  }

  .card-list {
    padding: 10px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card-list.drag-over {
    background: color-mix(in srgb, var(--drop) 6%, transparent);
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .card-list:empty::after {
    content: "Drop cards here";
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 24px 0;
    border: 2px dashed var(--border);
    border-radius: 10px;
  }

  /* ---------- Unassigned tray ---------- */
  .tray {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .tray-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .tray .card-list {
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .tray .card { width: auto; max-width: 260px; }
  .tray .card-list:empty::after { flex: 1; }

  /* ---------- Card ---------- */
  .card {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px 8px 12px;
    cursor: grab;
    box-shadow: 0 1px 2px rgba(0, 0, 0, .35);
    transition: box-shadow .12s, opacity .12s;
    position: relative;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .4; }
  .card.drop-before::before,
  .card.drop-after::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    border-radius: 2px;
    background: var(--drop);
  }
  .card.drop-before::before { top: -6px; }
  .card.drop-after::after { bottom: -6px; }
  .tray .card.drop-before::before,
  .tray .card.drop-after::after {
    top: 0; bottom: 0;
    height: auto;
    width: 3px;
  }
  .tray .card.drop-before::before { left: -6px; right: auto; }
  .tray .card.drop-after::after { right: -6px; left: auto; }

  .card-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .icon-btn {
    flex: none;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    cursor: pointer;
  }
  .icon-btn:hover { color: var(--danger); background: var(--danger-bg); }

  .empty-board {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 48px 0;
  }

  /* ---------- Dialog ---------- */
  dialog {
    border: none;
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--ink);
    box-shadow: 0 12px 40px rgba(0, 0, 0, .5);
    padding: 20px;
    width: min(560px, 92vw);
  }
  dialog::backdrop { background: rgba(0, 0, 0, .55); }
  dialog h2 { margin: 0 0 12px; font-size: 16px; }
  dialog textarea { min-height: 160px; resize: vertical; }
  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }
  .report { color: var(--muted); font-size: 12px; margin-top: 8px; min-height: 1em; }

  @media (max-width: 720px) {
    .composer { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Cards &amp; Groups</h1>
    <div class="actions">
      <button class="btn" id="importBtn" type="button">Import cards</button>
      <button class="btn danger" id="clearBtn" type="button">Clear all</button>
    </div>
  </header>

  <div class="composer">
    <form id="cardForm">
      <label for="cardInput">New card</label>
      <input type="text" id="cardInput" maxlength="29" placeholder="Card text (max 29 chars)" autocomplete="off" />
      <button class="btn primary" type="submit">Add</button>
    </form>
    <form id="groupForm">
      <label for="groupInput">New group</label>
      <input type="text" id="groupInput" maxlength="29" placeholder="Group title (max 29 chars)" autocomplete="off" />
      <button class="btn primary" type="submit">Add</button>
    </form>
  </div>

  <section class="tray">
    <div class="tray-head">Unassigned</div>
    <div class="card-list" data-container="unassigned"></div>
  </section>

  <main class="board" id="board"></main>
</div>

<dialog id="importDialog">
  <h2>Import cards</h2>
  <textarea id="importText" placeholder="One card per line. Lines longer than 29 characters are skipped."></textarea>
  <div class="dialog-actions">
    <button class="btn" id="importCancel" type="button">Cancel</button>
    <button class="btn primary" id="importConfirm" type="button">Create cards</button>
  </div>
  <div class="report" id="importReport"></div>
</dialog>

<script>
"use strict";

/* ================= Store =================
   groups: [{ id, title }]            — array order = board order
   cards:  [{ id, text, groupId }]    — array order = order inside its container
                                        groupId is null for the unassigned tray */
const MAX_LEN = 29;
const STORAGE_KEY = "cards-and-groups/v2";

const store = {
  groups: [],
  cards: [],

  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (Array.isArray(data.groups)) this.groups = data.groups;
      if (Array.isArray(data.cards)) this.cards = data.cards;
    } catch { /* corrupted storage — start fresh */ }
  },

  save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ groups: this.groups, cards: this.cards }));
    } catch { /* storage unavailable — app still works in memory */ }
  },

  addCard(text) {
    this.cards.push({ id: uid(), text, groupId: null });
  },

  addGroup(title) {
    this.groups.push({ id: uid(), title });
  },

  deleteCard(id) {
    this.cards = this.cards.filter(c => c.id !== id);
  },

  deleteGroup(id) {
    this.groups = this.groups.filter(g => g.id !== id);
    // orphaned cards return to the tray
    for (const c of this.cards) if (c.groupId === id) c.groupId = null;
  },

  /* Move a card into `groupId` (null = tray), placed relative to `refCardId`.
     refCardId null = append at the end of that container. */
  moveCard(cardId, groupId, refCardId, before) {
    const card = this.cards.find(c => c.id === cardId);
    if (!card || cardId === refCardId) return;
    this.cards = this.cards.filter(c => c.id !== cardId);
    card.groupId = groupId;
    let index = this.cards.length;
    if (refCardId != null) {
      const refIndex = this.cards.findIndex(c => c.id === refCardId);
      if (refIndex !== -1) index = before ? refIndex : refIndex + 1;
    }
    this.cards.splice(index, 0, card);
  },

  /* Reorder a group next to `refGroupId` on the board. */
  moveGroup(groupId, refGroupId, before) {
    if (groupId === refGroupId) return;
    const group = this.groups.find(g => g.id === groupId);
    if (!group) return;
    this.groups = this.groups.filter(g => g.id !== groupId);
    let index = this.groups.length;
    if (refGroupId != null) {
      const refIndex = this.groups.findIndex(g => g.id === refGroupId);
      if (refIndex !== -1) index = before ? refIndex : refIndex + 1;
    }
    this.groups.splice(index, 0, group);
  },

  cardsIn(groupId) {
    return this.cards.filter(c => c.groupId === groupId);
  },

  clear() {
    this.groups = [];
    this.cards = [];
  },
};

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function commit() {
  store.save();
  render();
}

/* ================= Rendering ================= */
const board = document.getElementById("board");
const tray = document.querySelector('[data-container="unassigned"]');

function render() {
  tray.replaceChildren(...store.cardsIn(null).map(cardEl));

  if (store.groups.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-board";
    empty.textContent = "No groups yet — create one above, then drag cards into it.";
    board.replaceChildren(empty);
    return;
  }
  board.replaceChildren(...store.groups.map(groupEl));
}

function cardEl(card) {
  const el = document.createElement("div");
  el.className = "card";
  el.draggable = true;
  el.dataset.cardId = card.id;

  const text = document.createElement("span");
  text.className = "card-text";
  text.textContent = card.text;
  text.title = card.text;

  const del = document.createElement("button");
  del.className = "icon-btn";
  del.type = "button";
  del.title = "Delete card";
  del.textContent = "×";
  del.dataset.action = "delete-card";

  el.append(text, del);
  return el;
}

function groupEl(group) {
  const el = document.createElement("section");
  el.className = "group";
  el.dataset.groupId = group.id;

  const head = document.createElement("div");
  head.className = "group-head";
  head.draggable = true;

  const title = document.createElement("span");
  title.className = "group-title";
  title.textContent = group.title;
  title.title = group.title;

  const cardsInGroup = store.cardsIn(group.id);

  const count = document.createElement("span");
  count.className = "group-count";
  count.textContent = cardsInGroup.length;

  const del = document.createElement("button");
  del.className = "icon-btn";
  del.type = "button";
  del.title = "Delete group (cards go back to Unassigned)";
  del.textContent = "×";
  del.dataset.action = "delete-group";

  head.append(title, count, del);

  const list = document.createElement("div");
  list.className = "card-list";
  list.dataset.container = group.id;
  list.append(...cardsInGroup.map(cardEl));

  el.append(head, list);
  return el;
}

/* ================= Drag & drop =================
   dataTransfer data is unreadable during dragover, so the dragged
   item is tracked in `drag` for the duration of the gesture. */
let drag = null; // { type: "card"|"group", id }

document.addEventListener("dragstart", e => {
  const cardNode = e.target.closest?.(".card");
  const headNode = e.target.closest?.(".group-head");
  if (cardNode) {
    drag = { type: "card", id: cardNode.dataset.cardId };
    cardNode.classList.add("dragging");
  } else if (headNode) {
    const groupNode = headNode.closest(".group");
    drag = { type: "group", id: groupNode.dataset.groupId };
    groupNode.classList.add("dragging");
  } else {
    return;
  }
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", drag.id);
});

document.addEventListener("dragend", () => {
  drag = null;
  clearDropHints();
});

document.addEventListener("dragover", e => {
  if (!drag) return;
  clearDropHints();

  if (drag.type === "card") {
    const list = e.target.closest?.(".card-list");
    if (!list) return;
    e.preventDefault();
    const target = cardDropTarget(e, list);
    if (target.ref) {
      target.ref.classList.add(target.before ? "drop-before" : "drop-after");
    } else {
      list.classList.add("drag-over");
    }
  } else {
    const groupNode = e.target.closest?.(".group");
    if (!groupNode || groupNode.dataset.groupId === drag.id) return;
    e.preventDefault();
    groupNode.classList.add(dropsBefore(e, groupNode) ? "drop-before" : "drop-after");
  }
});

document.addEventListener("drop", e => {
  if (!drag) return;

  if (drag.type === "card") {
    const list = e.target.closest?.(".card-list");
    if (!list) return;
    e.preventDefault();
    const container = list.dataset.container === "unassigned" ? null : list.dataset.container;
    const target = cardDropTarget(e, list);
    store.moveCard(drag.id, container, target.ref?.dataset.cardId ?? null, target.before);
  } else {
    const groupNode = e.target.closest?.(".group");
    if (!groupNode) return;
    e.preventDefault();
    store.moveGroup(drag.id, groupNode.dataset.groupId, dropsBefore(e, groupNode));
  }

  drag = null;
  commit();
});

/* Which card in `list` the pointer is over, and whether the drop
   lands before or after it. ref null = empty area → append. */
function cardDropTarget(e, list) {
  const ref = e.target.closest?.(".card");
  if (ref && ref.parentElement === list && ref.dataset.cardId !== drag.id) {
    return { ref, before: dropsBefore(e, ref) };
  }
  return { ref: null, before: false };
}

/* Before/after by pointer position past the element's midpoint,
   along whichever axis the layout flows. */
function dropsBefore(e, el) {
  const rect = el.getBoundingClientRect();
  const horizontal = el.closest(".tray") !== null || el.classList.contains("group");
  return horizontal
    ? e.clientX < rect.left + rect.width / 2
    : e.clientY < rect.top + rect.height / 2;
}

function clearDropHints() {
  document.querySelectorAll(".drop-before, .drop-after, .drag-over")
    .forEach(el => el.classList.remove("drop-before", "drop-after", "drag-over"));
}

/* ================= Clicks (delete) ================= */
document.addEventListener("click", e => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  if (btn.dataset.action === "delete-card") {
    store.deleteCard(btn.closest(".card").dataset.cardId);
    commit();
  } else if (btn.dataset.action === "delete-group") {
    store.deleteGroup(btn.closest(".group").dataset.groupId);
    commit();
  }
});

/* ================= Forms ================= */
const cardForm = document.getElementById("cardForm");
const cardInput = document.getElementById("cardInput");
const groupForm = document.getElementById("groupForm");
const groupInput = document.getElementById("groupInput");

cardForm.addEventListener("submit", e => {
  e.preventDefault();
  const text = cardInput.value.trim();
  if (!text || text.length > MAX_LEN) return;
  store.addCard(text);
  cardInput.value = "";
  cardInput.focus();
  commit();
});

groupForm.addEventListener("submit", e => {
  e.preventDefault();
  const title = groupInput.value.trim();
  if (!title || title.length > MAX_LEN) return;
  store.addGroup(title);
  groupInput.value = "";
  groupInput.focus();
  commit();
});

/* ================= Import & clear ================= */
const importDialog = document.getElementById("importDialog");
const importText = document.getElementById("importText");
const importReport = document.getElementById("importReport");

document.getElementById("importBtn").addEventListener("click", () => {
  importText.value = "";
  importReport.textContent = "";
  importDialog.showModal();
});

document.getElementById("importCancel").addEventListener("click", () => importDialog.close());

document.getElementById("importConfirm").addEventListener("click", () => {
  const lines = importText.value.split(/\r?\n/).map(s => s.trim());
  let added = 0, skipped = 0;
  for (const line of lines) {
    if (!line) continue;
    if (line.length > MAX_LEN) { skipped++; continue; }
    store.addCard(line);
    added++;
  }
  commit();
  importReport.textContent = `Added ${added} card${added === 1 ? "" : "s"}` + (skipped ? `, skipped ${skipped} too-long line${skipped === 1 ? "" : "s"}` : "") + ".";
  if (added > 0) setTimeout(() => importDialog.close(), 600);
});

document.getElementById("clearBtn").addEventListener("click", () => {
  if (!confirm("Delete all cards and groups?")) return;
  store.clear();
  localStorage.removeItem(STORAGE_KEY);
  render();
});

/* ================= Init ================= */
store.load();
render();
</script>
</body>
</html>
